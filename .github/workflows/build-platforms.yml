name: Windows and macOS Runtime Smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PROTOBUF_COMMIT: f0dc78d7e6e331b8c6bb2d5283e06aa26883ca7c

jobs:
  runtime-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout Protobuf 3.21.12
        uses: actions/checkout@v4
        with:
          repository: protocolbuffers/protobuf
          ref: ${{ env.PROTOBUF_COMMIT }}
          path: third_party/protobuf
          submodules: recursive

      - name: Install Qt on Windows
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          cache: true

      - name: Initialize MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://npcap.com/dist/npcap-sdk-1.15.zip -OutFile "$env:RUNNER_TEMP/npcap-sdk.zip"
          Expand-Archive "$env:RUNNER_TEMP/npcap-sdk.zip" -DestinationPath "$env:RUNNER_TEMP/npcap-sdk"
          "NPCAP_ROOT=$env:RUNNER_TEMP/npcap-sdk" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install qt@5 libpcap ninja

      - name: Build pinned Protobuf on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "$env:RUNNER_TEMP/protobuf-3.21.12"
          cmake -S third_party/protobuf/cmake -B protobuf-build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix" `
            -Dprotobuf_BUILD_TESTS=OFF -Dprotobuf_BUILD_SHARED_LIBS=OFF `
            -Dprotobuf_MSVC_STATIC_RUNTIME=OFF -Dprotobuf_WITH_ZLIB=OFF
          cmake --build protobuf-build --target install --parallel
          "PROTOBUF_ROOT=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build pinned Protobuf on macOS
        if: runner.os == 'macOS'
        run: |
          prefix="$RUNNER_TEMP/protobuf-3.21.12"
          cmake -S third_party/protobuf/cmake -B protobuf-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix" \
            -Dprotobuf_BUILD_TESTS=OFF -Dprotobuf_BUILD_SHARED_LIBS=OFF \
            -Dprotobuf_WITH_ZLIB=OFF
          cmake --build protobuf-build --target install --parallel
          echo "PROTOBUF_ROOT=$prefix" >> "$GITHUB_ENV"

      - name: Configure Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR;$env:PROTOBUF_ROOT"
          -DNPCAP_ROOT="$env:NPCAP_ROOT"

      - name: Configure macOS build
        if: runner.os == 'macOS'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@5);$PROTOBUF_ROOT"

      - name: Build runtime smoke test
        run: cmake --build build --target ostinato_compatibility_tests --parallel

      - name: Run runtime smoke test
        run: ctest --test-dir build --output-on-failure
