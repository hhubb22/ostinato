name: Linux C++ CI Build

on:
  push:
    branches: [master] # Adjust branch names as needed (e.g., master)
  pull_request:
    branches: [master] # Adjust branch names as needed

jobs:
  build-linux:
    strategy:
      fail-fast: false # Keep running other matrix jobs even if one fails
      matrix:
        compiler: [gcc, clang] # Define the compilers for the matrix

    runs-on: ubuntu-latest # Always run on Linux
    container: ghcr.io/hhubb22/ostinato-build:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up compiler (${{ matrix.compiler }})
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          elif [ "${{ matrix.compiler }}" = "clang" ]; then
            apt-get update -qq
            apt-get install -y --no-install-recommends clang
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure build (CMake)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build project (Ninja)
        run: cmake --build build --parallel

      - name: Run tests (CTest)
        run: ctest --test-dir build --output-on-failure
